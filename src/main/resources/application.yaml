server:
  port: 8080

spring:
  application:
    name: coaching-testimonials
  config:
    import: optional:file:.env[.properties], optional:file:blog_backend_v1/.env[.properties]

  # Jackson Serialization
  jackson:
    serialization:
      write-dates-as-timestamps: false

  # MongoDB Configuration
  data:
    mongodb:
      uri: ${MONGODB_URI}

  # Mail Configuration (Gmail SMTP)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000



# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# Application Custom Config
app:
  admin:
    username: ${ADMIN_USERNAME}
    password: ${ADMIN_PASSWORD}
  otp:
    length: 6
    expiry-minutes: 5
    max-attempts: 5
    resend-cooldown-seconds: 60
  frontend:
    url: ${FRONTEND_URL}
  jwt:
    secret: ${JWT_SECRET}
    expiry-hours: ${JWT_EXPIRY_HOURS}
  cloudinary:
    url: ${CLOUDINARY_URL}
  blog:
    notifications:
      enabled: ${BLOG_NOTIFICATIONS_ENABLED:false}

# Actuator config
management:
  health:
    mail:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always

# Logging configuration
logging:
  level:
    root: INFO
    com.blogapp: INFO
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %clr([%X{correlationId:-SYSTEM}]){yellow} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"